services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - agentctl-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: agentctl/gateway:local
    environment:
      GATEWAY_DATABASE_URL: sqlite:////data/gateway.db
      GATEWAY_REDIS_URL: redis://redis:6379/0
      GATEWAY_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      GATEWAY_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - gateway-data:/data
    networks:
      - agentctl-net
    depends_on:
      - redis

networks:
  agentctl-net:
    driver: bridge

volumes:
  gateway-data: {}
